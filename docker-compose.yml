services:
  mysql:
    image: mysql:8.0
    container_name: ankify-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ankify_root
      MYSQL_DATABASE: ankify
      MYSQL_USER: ankify
      MYSQL_PASSWORD: ankify_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional S3 emulation — sign up at localstack.cloud (free tier for individuals) and set
  # LOCALSTACK_AUTH_TOKEN in repo-root .env. Start with: docker compose --profile localstack up -d
  localstack:
    profiles: ["localstack"]
    image: localstack/localstack:latest
    container_name: ankify-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - localstack-data:/var/lib/localstack
      - ./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-s3.sh

volumes:
  mysql-data:
  localstack-data:
