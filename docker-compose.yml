services:
  mysql:
    image: mysql:8.0
    container_name: ankify-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ankify_root
      MYSQL_DATABASE: ankify
      MYSQL_USER: ankify
      MYSQL_PASSWORD: ankify_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LocalStack removed — requires paid license since 2025.
  # Using local filesystem storage for dev instead.
  # Uncomment and add LOCALSTACK_AUTH_TOKEN if you have a license.
  #
  # localstack:
  #   image: localstack/localstack
  #   container_name: ankify-localstack
  #   ports:
  #     - "4566:4566"
  #   environment:
  #     SERVICES: s3
  #     DEFAULT_REGION: us-east-1
  #     LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN}
  #   volumes:
  #     - localstack-data:/var/lib/localstack
  #     - ./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-s3.sh

volumes:
  mysql-data:
