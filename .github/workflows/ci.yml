name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Root tooling (Prettier).
      - name: Install root deps
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      # Backend: lint + typecheck.
      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Backend lint
        working-directory: backend
        run: npm run lint

      - name: Backend build (tsc)
        working-directory: backend
        run: npm run build

      # Frontend: lint + typecheck/build.
      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Frontend lint
        working-directory: frontend
        run: yarn lint

      - name: Frontend build (tsc -b + vite build)
        working-directory: frontend
        run: yarn build

  e2e:
    name: E2E (Playwright, mock AI)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ankify_root
          MYSQL_DATABASE: ankify
          MYSQL_USER: ankify
          MYSQL_PASSWORD: ankify_dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uankify -pankify_dev"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install deps for the three dirs the harness boots + the test runner.
      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Install e2e deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      # CI=true => reuseExistingServer is off, so Playwright's webServer starts
      # mock-ai (8099) + backend (3000, runs prisma migrate deploy) + frontend
      # (5173) fresh. globalSetup finds MySQL already up (service container)
      # and no-ops.
      - name: Run E2E
        working-directory: e2e
        env:
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
